<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🔒 Acceso Corporativo Restringido</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center px-4">
    <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl max-w-md w-full text-center">
        <h1 class="text-2xl font-bold text-white mb-2">Acceso de Alta Dirección</h1>
        <p class="text-slate-400 text-xs mb-6">Propiedad Intelectual Confidencial de la Compañía</p>
        
        <!-- Bloqueo estricto de autocompletado -->
        <div class="space-y-4">
            <input type="text" id="password-input" placeholder="Contraseña Clave" autocomplete="off" class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-center text-white focus:outline-none">
            <div id="login-error" class="text-red-400 text-xs hidden">Contraseña incorrecta. Acceso denegado.</div>
            <button type="button" onclick="verificarClave()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-3 rounded-xl">Entrar al Laboratorio</button>
        </div>
    </div>

    <script>
        function verificarClave() {
            const pass = document.getElementById('password-input').value;
            
            // Validación directa sin vueltas
            if (pass === "Directorio2026") {
                window.location.href = "laboratorio.html";
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
