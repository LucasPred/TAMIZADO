<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Sistema Restringido - Acceso Corporativo</title>
    <!-- Tailwind CSS para diseño institucional -->
    <script src="https://tailwindcss.com"></script>
    <!-- Lucide Icons para interfaz profesional -->
    <script src="https://unpkg.com"></script>
    <style>
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans flex items-center justify-center px-4" oncontextmenu="return false;">

    <div class="bg-slate-800/50 backdrop-blur-md p-8 rounded-2xl border border-slate-700/50 shadow-2xl max-w-md w-full text-center">
        <div class="w-16 h-16 bg-amber-500/10 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-amber-500/20">
            <i data-lucide="lock" class="w-8 h-8"></i>
        </div>
        <h1 class="text-2xl font-bold tracking-tight text-white mb-2">Acceso de Alta Dirección</h1>
        <p class="text-slate-400 text-sm mb-6">Módulo de Simulación Analítica y Propiedad Intelectual Confidencial.</p>
        
        <form id="login-form" class="space-y-4" onsubmit="handleLogin(event)">
            <div>
                <input type="password" id="password-input" placeholder="Introducir Contraseña Clave" 
                    class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl focus:outline-none focus:border-amber-500 text-center tracking-widest text-white transition-all">
            </div>
            <div id="login-error" class="text-red-400 text-xs hidden font-medium">Contraseña incorrecta. Acceso denegado.</div>
            <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-3 rounded-xl transition-all shadow-lg shadow-amber-500/10 flex items-center justify-center gap-2">
                <i data-lucide="shield-check" class="w-5 h-5"></i> Verificar Credenciales
            </button>
        </form>
        <div class="mt-6 text-[10px] text-slate-500 tracking-wider uppercase">Capa de Seguridad de Datos Cifrada SHA-256</div>
    </div>

    <script>
        lucide.createIcons();

        // Bloqueo estricto de teclas de inspección de código (F12, Ctrl+Shift+I, etc.)
        document.addEventListener('keydown', function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                e.preventDefault();
                return false;
            }
        });

        // Contraseña configurada de fábrica: Directorio2026
        const targetHash = "96cb71116ec7263595b119dc9469502b4fc32dd32669e2c608f3316ba488fb24";

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);                    
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const password = document.getElementById('password-input').value;
            const inputHash = await sha256(password);

            if (inputHash === targetHash) {
                // Redirección directa y segura al laboratorio analítico en la web
                window.location.href = "laboratorio.html";
            } else {
                const error = document.getElementById('login-error');
                error.classList.remove('hidden');
                document.getElementById('password-input').classList.add('border-red-500');
            }
        }
    </script>
</body>
</html>
